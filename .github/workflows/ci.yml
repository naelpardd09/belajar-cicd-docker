name: Pipeline Pertama

on:
  push:
    branches:
      - main

jobs:
  hello:
    runs-on: ubuntu-latest

    steps:
      - name: Ucapkan Salam
        run: echo "Halo, ini pipeline pertamaku!"

      - name: Cek Waktu
        run: date

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Flake8
        run: pip install flake8

      - name: Run Linter
        run: flake8 app.py --max-line-length=120